<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="car" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 원 -->
  <circle cx="100" cy="100" r="98" fill="url(#bg)" stroke="#334155" stroke-width="1.5"/>

  <!-- 속도선 (배경) -->
  <line x1="15" y1="88" x2="55" y2="88" stroke="#1e40af" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="10" y1="96" x2="45" y2="96" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="18" y1="104" x2="50" y2="104" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <line x1="145" y1="88" x2="185" y2="88" stroke="#1e40af" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="155" y1="96" x2="190" y2="96" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="150" y1="104" x2="182" y2="104" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- F1 레이싱카 바디 -->
  <g filter="url(#glow)">
    <!-- 메인 바디 -->
    <path d="M48 92 L62 80 L138 80 L152 92 L152 108 L138 116 L62 116 L48 108 Z"
          fill="url(#car)" opacity="0.95"/>

    <!-- 레이싱 스트라이프 -->
    <path d="M72 80 L88 80 L88 116 L72 116 Z" fill="url(#stripe)" opacity="0.85"/>

    <!-- 코크핏 -->
    <ellipse cx="100" cy="93" rx="18" ry="10" fill="#0f172a" opacity="0.9"/>
    <ellipse cx="100" cy="93" rx="14" ry="7" fill="#1e293b" opacity="0.8"/>

    <!-- 앞 날개 -->
    <path d="M130 106 L160 112 L160 116 L130 116 Z" fill="url(#car)" opacity="0.7"/>
    <!-- 뒷 날개 -->
    <path d="M40 106 L70 106 L70 116 L40 116 Z" fill="url(#car)" opacity="0.7"/>

    <!-- 뒤 스포일러 -->
    <rect x="136" y="77" width="18" height="5" rx="2" fill="url(#stripe)" opacity="0.9"/>

    <!-- 바퀴 앞 -->
    <circle cx="130" cy="116" r="10" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <circle cx="130" cy="116" r="5" fill="#334155"/>

    <!-- 바퀴 뒤 -->
    <circle cx="70" cy="116" r="10" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <circle cx="70" cy="116" r="5" fill="#334155"/>
  </g>

  <!-- TR 텍스트 -->
  <text x="100" y="158" font-family="system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="800" fill="#f8fafc"
        text-anchor="middle" letter-spacing="4">TOKEN</text>
  <text x="100" y="178" font-family="system-ui, -apple-system, sans-serif"
        font-size="14" font-weight="600" fill="#3b82f6"
        text-anchor="middle" letter-spacing="8">RACE</text>
</svg>
